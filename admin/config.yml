backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "dishes"
    label: "Bakery Menu Dishes"
    folder: "data/dishes"
    extension: "json" # Forces the CMS to save data as a readable JSON file
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Dish Name", name: "title", widget: "string" }
      - { label: "Dish Photo", name: "image", widget: "image" }
      - { label: "Category", name: "category", widget: "select", options: ["bakery", "fastfood"] }
      - { label: "Short Description", name: "description", widget: "text" }
