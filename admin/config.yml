backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME # Replace with your real username/repo names
  branch: main # Or master, depending on your default branch

media_folder: "assets/images" # Where uploaded dish photos will be saved
public_folder: "/assets/images"

collections:
  - name: "dishes"
    label: "Bakery Menu Dishes"
    folder: "data/dishes" # Where dish details will be saved as small files
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Dish Name", name: "title", widget: "string" }
      - { label: "Dish Photo", name: "image", widget: "image" }
      - { label: "Category", name: "category", widget: "select", options: ["bakery", "fastfood"] }
      - { label: "Short Description", name: "description", widget: "text" }
